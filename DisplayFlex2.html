<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flexbox Center</title>

    <style>

        body{
            margin:0;
            background:black;
        }

        .container{

            display:flex;

            justify-content:center;

            align-items:center;

            gap:15px;

            height:100vh;
        }

        .box{

            width:120px;
            height:120px;

            border:2px solid gray;

            background:khaki;

            color:red;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:30px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>

    </div>

</body>
</html>
